<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberPay Docs</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #060b13;
        color: #d9e4f6;
      }
      .wrap {
        max-width: 900px;
        margin: 0 auto;
        padding: 28px 20px;
      }
      h1 {
        margin: 0 0 12px;
      }
      .card {
        border: 1px solid rgba(92, 114, 156, 0.28);
        border-radius: 6px;
        background: rgba(8, 13, 22, 0.84);
        padding: 16px;
        margin-bottom: 14px;
      }
      code {
        background: rgba(26, 38, 61, 0.7);
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>CyberPay Docs</h1>
      <section class="card">
        <h3>Demo Flow</h3>
        <p>Connect wallet -> Load contract -> Configure employee -> Run payroll -> Claim -> Refresh dashboard.</p>
      </section>
      <section class="card">
        <h3>Mode Notes</h3>
        <p><code>claimPlain</code> and <code>configureEmployeePlain</code> are for demo reliability.</p>
        <p>Production flow uses encrypted inputs via <code>claim</code> and <code>configureEmployee</code>.</p>
      </section>
    </main>
  </body>
</html>
